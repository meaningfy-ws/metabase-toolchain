# =============================================================================
# Metabase Stack - Local Development
# Usage:
#   from repo root:  docker compose -f infra/docker-compose.yml up -d
#   or via Make:     make metabase-up
# =============================================================================

networks:
  metabase-net:
    driver: bridge

services:
  metabase-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - metabase-net
    environment:
      POSTGRES_DB: ${MB_DB_DBNAME:-metabaseappdb}
      POSTGRES_USER: ${MB_DB_USER:-metabase}
      POSTGRES_PASSWORD: ${MB_DB_PASSWORD:-metabase}
    ports:
      - "127.0.0.1:${MB_DB_HOST_PORT:-5432}:5432"
    volumes:
      - metabase-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MB_DB_USER:-metabase} -d ${MB_DB_DBNAME:-metabaseappdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:${METABASE_VERSION:-v0.44.6}
    restart: unless-stopped
    networks:
      - metabase-net
    ports:
      - "${METABASE_HOST_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase-postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${MB_DB_DBNAME:-metabaseappdb}
      MB_DB_USER: ${MB_DB_USER:-metabase}
      MB_DB_PASS: ${MB_DB_PASSWORD:-metabase}
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost:3000}
      JAVA_TIMEZONE: ${JAVA_TIMEZONE:-UTC}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - metabase-plugins:/plugins
    depends_on:
      metabase-postgres:
        condition: service_healthy

  mongo:
    image: mongo:${MONGO_VERSION:-6}
    restart: unless-stopped
    networks:
      - metabase-net
    ports:
      - "127.0.0.1:${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  metabase-postgres-data:
  metabase-plugins:
  mongo-data:
